<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鋤大Dee 計分器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans TC", system-ui, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #1e3a5f;
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }
    .card {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }
    .card:hover {
      border-color: #e8b931;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .card h2 {
      color: #1e3a5f;
      margin-bottom: 10px;
      font-size: 20px;
    }
    .card p {
      color: #64748b;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .btn {
      display: inline-block;
      background: #e8b931;
      color: #1e3a5f;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #d4a825;
    }
    .footer {
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>🃏 鋤大Dee 計分器</h1>

    <div class="card">
      <h2>🃏 鋤大Dee 計分器</h2>
      <p>經典撲克牌遊戲「鋤大Dee」的計分工具，支持4人遊戲，實時計算分數和排名。</p>
      <a href="big-two-scoreboard.html" class="btn">打開計分器</a>
    </div>

    <div class="footer">
      由 Gitee Pages 提供支持
    </div>
  </div>
</body>
</html>
