<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>出來聊天</title>
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a5f',
            accent: '#e8b931',
            danger: '#dc2626',
            success: '#16a34a',
            neon: {
              cyan: '#00f0ff',
              pink: '#ff2d95',
              purple: '#a855f7',
            },
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.2); border-radius: 2px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 5px currentColor; } 50% { box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; } }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes toastIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes toastOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.8); } }

    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .animate-slideUp { animation: slideUp 0.3s ease-out; }
    .toast-in { animation: toastIn 0.3s ease-out forwards; }
    .toast-out { animation: toastOut 0.4s ease-in forwards; }

    /* 彩纸特效 */
    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      top: 0;
      width: 10px;
      height: 10px;
      z-index: 100;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }

    /* 盈利突破弹窗特效 */
    @keyframes profitPulse {
      0% { box-shadow: 0 0 20px rgba(0,255,136,0.4); }
      50% { box-shadow: 0 0 40px rgba(0,255,136,0.6), 0 0 80px rgba(0,240,255,0.3); }
      100% { box-shadow: 0 0 20px rgba(0,255,136,0.4); }
    }
    .profit-toast-glow { animation: profitPulse 1s ease-in-out 3; }

    /* 霓虹发光效果 */
    .neon-glow-cyan { box-shadow: 0 0 10px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.05); border-color: rgba(0, 240, 255, 0.3); }
    .neon-glow-pink { box-shadow: 0 0 10px rgba(255, 45, 149, 0.3), inset 0 0 10px rgba(255, 45, 149, 0.05); border-color: rgba(255, 45, 149, 0.3); }
    .neon-glow-purple { box-shadow: 0 0 10px rgba(168, 85, 247, 0.3), inset 0 0 10px rgba(168, 85, 247, 0.05); border-color: rgba(168, 85, 247, 0.3); }
    .neon-text-cyan { color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
    .neon-text-pink { color: #ff2d95; text-shadow: 0 0 10px rgba(255, 45, 149, 0.5); }
    .neon-text-green { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
    .neon-text-red { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.5); }

    /* 网格背景 */
    .grid-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* 安全区域 */
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

    /* 弹窗 */
    @media (max-width: 480px) {
      .modal-body { max-height: 85vh; max-height: 85dvh; overflow-y: auto; }
    }

    /* 超小屏 */
    @media (max-width: 360px) {
      .player-profit { font-size: 1.5rem !important; }
      .player-name { font-size: 0.625rem !important; }
    }

    /* 動畫最佳實踐 */
    button:active:not(:disabled) {
      transform: scale(0.97);
      transition: transform 100ms ease-out;
    }
    .animate-fadeIn { will-change: opacity, transform; }
    .animate-slideUp { will-change: opacity, transform; }
    .toast-in, .toast-out { will-change: opacity, transform; }

    /* 觸控目標：最小 44px */
    button, [onclick], input[type="number"] {
      min-height: 44px;
      min-width: 44px;
    }

    /* 禁用觸摸設備的 hover 效果 */
    @media (hover: none) {
      .card:hover, button:hover { transform: none !important; box-shadow: none !important; }
    }

    /* 流體字號 */
    .fluid-profit {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
    }

    /* 底部輸入區：防止列被壓縮 */
    .input-col {
      flex: 1 1 0;
      min-width: 0;
    }
    .input-col input[type="number"] {
      font-size: max(16px, 1rem); /* 防止 iOS 自動縮放 */
    }
  </style>
</head>
<body class="text-white font-sans flex flex-col overflow-hidden grid-bg"
  style="height: 100vh; height: 100dvh; background: #0a0a1a;">

  <!-- 背景霓虹光斑 -->
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="absolute rounded-full" style="width:400px;height:400px;background:radial-gradient(circle,rgba(0,240,255,0.25),transparent 70%);top:-100px;right:-80px;filter:blur(60px);"></div>
    <div class="absolute rounded-full" style="width:350px;height:350px;background:radial-gradient(circle,rgba(255,45,149,0.2),transparent 70%);bottom:15%;left:-80px;filter:blur(50px);"></div>
    <div class="absolute rounded-full" style="width:280px;height:280px;background:radial-gradient(circle,rgba(168,85,247,0.18),transparent 70%);top:45%;right:-50px;filter:blur(50px);"></div>
  </div>

  <!-- 顶栏 -->
  <header class="safe-top sticky top-0 z-30" style="background:rgba(10,10,26,0.6);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border-bottom:1px solid rgba(0,240,255,0.15);">
    <div class="max-w-2xl mx-auto px-3 sm:px-4 py-2.5 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xl">🃏</span>
        <h1 class="text-base font-bold neon-text-cyan">出來聊天</h1>
      </div>
      <div class="flex items-center gap-1.5 flex-wrap justify-end">
        <span class="text-xs text-gray-400 whitespace-nowrap">小局 <span id="gameRound" class="font-bold neon-text-pink">1</span></span>
        <button onclick="handleUndo()" id="undoBtn"
          class="ml-1 px-2 py-1.5 rounded-lg text-xs font-medium transition-all disabled:opacity-30 disabled:cursor-not-allowed whitespace-nowrap"
          style="background:rgba(0,240,255,0.08);border:1px solid rgba(0,240,255,0.15);color:#00f0ff;"
          disabled>
          ↩ 撤銷
        </button>
        <button onclick="handleResetRound()"
          class="px-2 py-1.5 rounded-lg text-xs font-medium transition-all whitespace-nowrap"
          style="background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);color:#a855f7;">
          重置小局
        </button>
        <button onclick="handleResetGame()"
          class="px-2 py-1.5 rounded-lg text-xs font-medium transition-all whitespace-nowrap"
          style="background:rgba(255,51,102,0.08);border:1px solid rgba(255,51,102,0.15);color:#ff3366;">
          重置遊戲
        </button>
      </div>
    </div>
  </header>

  <!-- 玩家卡片常驻栏 -->
  <div class="relative z-10" style="background:rgba(10,10,26,0.6);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border-bottom:2px solid rgba(0,240,255,0.3);box-shadow:0 4px 20px rgba(0,240,255,0.08),inset 0 -1px 0 rgba(255,255,255,0.04);">
    <div class="max-w-2xl mx-auto px-3 sm:px-4 py-1.5 sm:py-2">
      <div class="grid grid-cols-4 gap-1.5 sm:gap-2" id="playersPanel"></div>
    </div>
  </div>

  <!-- 主内容区：历史记录滚动 -->
  <div class="flex-1 overflow-hidden relative z-10">
    <div class="h-full overflow-y-auto px-3 sm:px-4 py-3" id="mainPanel">

      <!-- 历史记录标题 -->
      <div id="historySection" class="mb-2">
        <div class="flex items-center gap-2 mb-2">
          <div class="h-px flex-1" style="background:linear-gradient(90deg,transparent,rgba(0,240,255,0.3),transparent);"></div>
          <span class="text-xs font-bold tracking-widest" style="color:rgba(0,240,255,0.5);">歷史記錄</span>
          <div class="h-px flex-1" style="background:linear-gradient(90deg,transparent,rgba(0,240,255,0.3),transparent);"></div>
        </div>
      </div>

      <!-- 历史记录表格 -->
      <div id="historyWrap" class="rounded-xl overflow-hidden mb-4" style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);">
        <div id="historyHeader" class="flex gap-2 px-3 sm:px-4 py-2 text-xs" style="color:rgba(0,240,255,0.6);"></div>
        <div id="historyBody" class="text-gray-300 px-3 sm:px-4"></div>
      </div>

      <div id="historyEmpty" class="text-center py-10">
        <div class="text-5xl mb-3">🎴</div>
        <div class="text-sm" style="color:rgba(0,240,255,0.4);">尚無記錄</div>
        <div class="text-xs mt-1" style="color:rgba(255,255,255,0.15);">開始遊戲後將顯示在這裡</div>
      </div>

      <!-- 底部留白，避免被输入区遮挡 -->
      <div class="h-4"></div>
    </div>
  </div>

  <!-- 底部输入区 -->
  <div class="safe-bottom sticky bottom-0 z-20" style="background:rgba(10,10,26,0.65);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border-top:2px solid rgba(0,240,255,0.4);box-shadow:0 -4px 20px rgba(0,240,255,0.1),0 -1px 0 rgba(0,240,255,0.2);">
    <div class="max-w-2xl mx-auto px-3 sm:px-4 pt-3 pb-3">
      <!-- 牌数输入 -->
      <div class="flex items-center gap-2 mb-3">
        <label class="text-xs font-bold shrink-0 w-8 sm:w-10" style="color:#00f0ff;text-shadow:0 0 8px rgba(0,240,255,0.4);">牌數</label>
        <div id="cardsInput" class="flex gap-2 flex-1"></div>
      </div>

      <!-- 确认按钮和提示 -->
      <div class="flex items-center gap-3">
        <button id="confirmBtn" onclick="handleConfirmTurn()"
          class="flex-shrink-0 px-6 py-2.5 rounded-xl text-sm font-bold transition-all disabled:opacity-30 disabled:cursor-not-allowed"
          style="background:linear-gradient(135deg,#ff2d95,#a855f7);color:#fff;box-shadow:0 0 20px rgba(255,45,149,0.4),0 0 40px rgba(168,85,247,0.15);">
          確認本輪
        </button>
        <span id="inputHint" class="text-xs truncate"></span>
      </div>
    </div>
  </div>

  <!-- 结算弹窗 -->
  <div id="settlementModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto" style="display:none">
    <div class="absolute inset-0" style="background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);" onclick="closeSettlementModal()"></div>
    <div class="relative rounded-2xl p-5 sm:p-6 w-full max-w-lg animate-fadeIn modal-body"
      style="background:rgba(15,15,35,0.95);backdrop-filter:blur(20px);border:1px solid rgba(0,240,255,0.2);box-shadow:0 0 40px rgba(0,240,255,0.1);">
      <h2 class="text-xl font-bold mb-1 neon-text-cyan">🎉 沖線！</h2>
      <p class="text-sm mb-4" id="settlementTrigger" style="color:rgba(0,240,255,0.7);"></p>

      <div class="mb-4">
        <h3 class="text-xs font-bold mb-2 uppercase tracking-wider" style="color:rgba(255,45,149,0.6);">結算匯總</h3>
        <div class="grid grid-cols-2 gap-2" id="settlementSummary"></div>
      </div>

      <button onclick="startNewGameRound()"
        class="w-full py-3 rounded-xl font-bold transition-all"
        style="background:linear-gradient(135deg,#00f0ff,#a855f7);color:#fff;box-shadow:0 0 20px rgba(0,240,255,0.3);">
        開始新小局 ♦️3
      </button>
    </div>
  </div>

  <!-- 彩蛋弹窗 -->
  <div id="easterToast" class="fixed z-50 pointer-events-none" style="inset:0;display:none;margin:auto;width:fit-content;height:fit-content;">
    <div class="px-6 py-4 rounded-2xl text-center max-w-xs"
      style="background:rgba(10,10,26,0.95);backdrop-filter:blur(20px);border:2px solid rgba(255,45,149,0.5);box-shadow:0 0 30px rgba(255,45,149,0.3),0 0 60px rgba(168,85,247,0.15);">
      <div id="easterEmoji" class="text-3xl mb-2">🐶</div>
      <div id="easterText" class="text-sm font-bold neon-text-pink"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // 鋤大Dee 計分器
    // 盈利計算：其他玩家牌數總和 - 3×自己牌數
    // ============================================================

    const STORAGE_KEY = 'bigTwoScoreboard';
    const NEON_COLORS = ['cyan', 'pink', 'purple', 'green'];
    const NEON_CSS = {
      cyan:   { bg: 'rgba(0,240,255,0.06)',   border: 'rgba(0,240,255,0.2)',   glow: 'neon-glow-cyan',   text: 'neon-text-cyan' },
      pink:   { bg: 'rgba(255,45,149,0.06)',   border: 'rgba(255,45,149,0.2)',   glow: 'neon-glow-pink',   text: 'neon-text-pink' },
      purple: { bg: 'rgba(168,85,247,0.06)',   border: 'rgba(168,85,247,0.2)',   glow: 'neon-glow-purple', text: 'neon-text-pink' },
      green:  { bg: 'rgba(0,255,136,0.06)',    border: 'rgba(0,255,136,0.2)',    glow: 'neon-glow-cyan',   text: 'neon-text-green' },
    };

    let state = {
      players: ['玩家1', '玩家2', '玩家3', '玩家4'],
      totalScores: [0, 0, 0, 0],
      profits: [0, 0, 0, 0],
      gameRound: 1,
      history: [],
      roundScores: [0, 0, 0, 0],
      roundProfits: [0, 0, 0, 0],
      undoStack: [],
    };

    let cardInputs = [null, null, null, null];
    let turnInRound = 1;

    // ---------- 初始化 ----------
    function init() { loadState(); renderAll(); }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
          if (!state.profits) state.profits = [0, 0, 0, 0];
          if (!state.roundProfits) state.roundProfits = [0, 0, 0, 0];
          const lastRecord = state.history[state.history.length - 1];
          if (lastRecord && lastRecord.round === state.gameRound) {
            turnInRound = lastRecord.turnInRound + 1;
          } else { turnInRound = 1; }
        }
      } catch (e) { console.warn('載入失敗:', e); }
    }

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) { console.warn('儲存失敗:', e); }
    }

    // ---------- 盈利計算 ----------
    function calcTurnProfits(winnerIdx, losers) {
      const cards = [0, 0, 0, 0];
      losers.forEach(l => { cards[l.idx] = l.cards; });
      const profits = [0, 0, 0, 0];
      for (let i = 0; i < 4; i++) {
        let othersTotal = 0;
        for (let j = 0; j < 4; j++) { if (j !== i) othersTotal += cards[j]; }
        profits[i] = othersTotal - 3 * cards[i];
      }
      return profits;
    }

    // ---------- 渲染 ----------
    function renderAll() {
      renderHeader();
      renderPlayersPanel();
      renderHistory();
      renderCardsInput();
      updateButtons();
      saveState();
    }

    function renderHeader() {
      document.getElementById('gameRound').textContent = state.gameRound;
    }

    function renderPlayersPanel() {
      const container = document.getElementById('playersPanel');
      // 不同颜色的人形图标
      const defaultIcons = ['👤', '👤', '👤', '👤'];

      container.innerHTML = state.players.map((name, i) => {
        const profit = state.profits[i] + state.roundProfits[i];
        const isPositive = profit > 0;
        const isNegative = profit < 0;
        const neon = NEON_CSS[NEON_COLORS[i]];
        const icon = (name.includes('超') || name.includes('钊')) ? '🐶' : defaultIcons[i];

        return `
          <div class="rounded-lg p-1.5 sm:p-2 text-center transition-all ${neon.glow}"
            style="background:${neon.bg};border:1px solid ${neon.border};">
            <div class="text-base leading-none mb-0.5">${icon}</div>
            <div class="text-[9px] sm:text-[10px] font-medium text-gray-400 cursor-pointer hover:text-white transition-colors truncate player-name"
              onclick="editPlayerName(${i})" title="點擊修改名稱">
              ${escapeHtml(name)} ✏️
            </div>
            <div class="font-black mt-0.5 player-profit fluid-profit ${isPositive ? 'neon-text-green' : isNegative ? 'neon-text-red' : 'text-white'}">
              ${profit > 0 ? '+' : ''}${profit}
            </div>
          </div>`;
      }).join('');
    }

    function renderHistory() {
      const header = document.getElementById('historyHeader');
      const body = document.getElementById('historyBody');
      const empty = document.getElementById('historyEmpty');
      const wrap = document.getElementById('historyWrap');
      const section = document.getElementById('historySection');

      if (state.history.length === 0) {
        header.innerHTML = '';
        body.innerHTML = '';
        empty.style.display = 'block';
        wrap.style.display = 'none';
        section.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      wrap.style.display = 'block';
      section.style.display = 'block';

      // 表头：与输入区对齐（w-8/w-10 + 4个flex-1）
      header.innerHTML = `<div class="w-8 sm:w-10 shrink-0 text-left font-medium">R</div>` +
        state.players.map(n => `<div class="flex-1 text-center font-medium">${escapeHtml(n.length > 4 ? n.substring(0, 4) : n)}</div>`).join('');

      let html = '';
      let currentRound = 0;

      state.history.forEach((record) => {
        if (record.round !== currentRound) {
          if (currentRound > 0) {
            const roundRecords = state.history.filter(r => r.round === currentRound);
            const lastRecord = roundRecords[roundRecords.length - 1];
            if (lastRecord && lastRecord.roundScores) {
              html += `<div class="flex gap-2 items-center py-2" style="border-top:2px solid rgba(0,240,255,0.15);">
                <div class="w-8 sm:w-10 shrink-0 text-xs font-bold" style="color:rgba(0,240,255,0.5);">合計</div>`;
              for (let pi = 0; pi < 4; pi++) {
                const isDanger = lastRecord.roundScores[pi] >= 100;
                html += `<div class="flex-1 text-center font-bold ${isDanger ? 'neon-text-red' : 'text-white'}">${lastRecord.roundScores[pi]}</div>`;
              }
              html += '</div>';
            }
            html += `<div class="py-2">
              <div class="flex items-center gap-2">
                <div class="flex-1 h-px" style="background:linear-gradient(90deg,transparent,rgba(255,45,149,0.3),transparent);"></div>
                <span class="text-xs font-bold px-2 neon-text-pink">小局 ${record.round}</span>
                <div class="flex-1 h-px" style="background:linear-gradient(90deg,transparent,rgba(255,45,149,0.3),transparent);"></div>
              </div>
            </div>`;
          }
          currentRound = record.round;
        }

        html += `<div class="flex gap-2 items-center py-1.5 sm:py-2 hover:bg-white/[0.02] transition-colors" style="border-top:1px solid rgba(255,255,255,0.04);">
          <div class="w-8 sm:w-10 shrink-0 text-xs font-medium" style="color:rgba(0,240,255,0.4);">${record.turnInRound}</div>`;
        for (let pi = 0; pi < 4; pi++) {
          if (pi === record.winner) {
            html += '<div class="flex-1 text-center font-medium neon-text-green">0 ✓</div>';
          } else {
            const loserInfo = record.losers.find(l => l.idx === pi);
            html += `<div class="flex-1 text-center text-gray-300">${loserInfo ? loserInfo.cards : '-'}</div>`;
          }
        }
        html += '</div>';
      });

      // 最后一个小局合计
      if (currentRound > 0) {
        const lastRecord = state.history[state.history.length - 1];
        if (lastRecord && lastRecord.roundScores) {
          html += `<div class="flex gap-2 items-center py-2" style="border-top:2px solid rgba(0,240,255,0.15);">
            <div class="w-8 sm:w-10 shrink-0 text-xs font-bold" style="color:rgba(0,240,255,0.5);">合計</div>`;
          for (let pi = 0; pi < 4; pi++) {
            const isDanger = lastRecord.roundScores[pi] >= 100;
            html += `<div class="flex-1 text-center font-bold ${isDanger ? 'neon-text-red' : 'text-white'}">${lastRecord.roundScores[pi]}</div>`;
          }
          html += '</div>';
        }
      }

      body.innerHTML = html;

      // 滚动到底部
      const panel = document.getElementById('mainPanel');
      panel.scrollTop = panel.scrollHeight;
    }

    function renderCardsInput() {
      const container = document.getElementById('cardsInput');
      container.innerHTML = state.players.map((name, i) => {
        const neon = NEON_CSS[NEON_COLORS[i]];
        return `
        <div class="input-col">
          <label class="text-[10px] block text-center mb-1 truncate px-1 py-0.5 rounded-lg font-bold" style="color:#fff;text-shadow:0 0 10px ${neon.border};background:${neon.bg.replace('0.06', '0.15')};border:1px solid ${neon.border.replace('0.2', '0.5')};box-shadow:0 0 12px ${neon.border.replace('0.2', '0.5')}, inset 0 0 8px ${neon.border.replace('0.2', '0.2')};">${escapeHtml(name.length > 3 ? name.substring(0, 3) : name)}</label>
          <input type="number" min="1" max="100" step="1"
            placeholder="?"
            value="${cardInputs[i] !== null ? cardInputs[i] : ''}"
            oninput="onCardInput(${i}, this.value)"
            onfocus="this.style.borderColor='${neon.border}';this.style.boxShadow='0 0 16px ${neon.border}, inset 0 0 8px ${neon.border}';this.style.background='rgba(255,255,255,0.1)';"
            onblur="this.style.borderColor='${neon.border}';this.style.boxShadow='0 0 8px ${neon.border}';this.style.background='rgba(255,255,255,0.06)';"
            class="w-full px-1 py-2.5 rounded-lg text-white text-center text-base font-bold placeholder-gray-500 focus:outline-none transition-all"
            style="background:rgba(255,255,255,0.06);border:1.5px solid ${neon.border};box-shadow:0 0 8px ${neon.border};">
        </div>`;
      }).join('');
    }

    function updateButtons() {
      const filled = cardInputs.filter(v => v !== null && v > 0);
      const emptyCount = cardInputs.filter(v => v === null || v === 0).length;
      const allInRange = filled.every(v => v >= 1 && v <= 100);
      const canConfirm = filled.length === 3 && emptyCount === 1 && allInRange;

      document.getElementById('confirmBtn').disabled = !canConfirm;
      document.getElementById('undoBtn').disabled = state.undoStack.length === 0;

      const hint = document.getElementById('inputHint');
      if (emptyCount === 4) {
        hint.textContent = '請輸入3位玩家的牌數，留空者為赢家';
        hint.style.color = 'rgba(255,255,255,0.25)';
      } else if (emptyCount === 0) {
        hint.textContent = '請留空1位玩家（赢家）';
        hint.style.color = '#e8b931';
      } else if (emptyCount > 1) {
        hint.textContent = '只能留空1位玩家（赢家）';
        hint.style.color = '#e8b931';
      } else if (!allInRange) {
        hint.textContent = '牌數範圍：1-100';
        hint.style.color = '#e8b931';
      } else {
        hint.textContent = '✓ 可以確認';
        hint.style.color = '#00ff88';
      }
    }

    // ---------- 彩蛋：连续赢牌检测 ----------

    const EASTER_MSGS = {
      3: '够咯够咯',
      4: '当个人吧',
      5: '懒得说你了',
      6: '你自己一个玩晒啦',
    };

    let easterTimer = null;

    // 盈利突破阈值
    const PROFIT_MILESTONES = [
      { threshold: 100, emoji: '💰', msg: '哇！*哥，犀利啊', color: '#00ff88' },
      { threshold: 200, emoji: '🤑', msg: '哇！*哥，赚大钱啊', color: '#e8b931' },
      { threshold: 300, emoji: '🚀', msg: '芜湖！*哥，起飞了', color: '#ff2d95' },
    ];

    function checkProfitMilestone(oldProfits, newProfits) {
      for (let pi = 0; pi < 4; pi++) {
        for (const milestone of PROFIT_MILESTONES) {
          if (oldProfits[pi] < milestone.threshold && newProfits[pi] >= milestone.threshold) {
            const name = state.players[pi];
            const shortName = name.length > 1 ? name.substring(0, 1) : name;
            const msg = milestone.msg.replace('*', shortName);
            showProfitToast(msg, milestone.emoji, milestone.color);
            spawnConfetti();
            return; // 每轮只弹一个
          }
        }
      }
    }

    function showProfitToast(text, emoji, color) {
      const toast = document.getElementById('easterToast');
      const textEl = document.getElementById('easterText');
      const emojiEl = document.getElementById('easterEmoji');
      const inner = toast.querySelector('div');

      textEl.textContent = text;
      emojiEl.textContent = emoji;
      textEl.style.color = color;
      textEl.style.textShadow = `0 0 12px ${color}`;

      // 特殊发光边框
      inner.style.borderColor = color;
      inner.style.boxShadow = `0 0 30px ${color}60, 0 0 60px ${color}20`;
      inner.classList.add('profit-toast-glow');

      if (easterTimer) { clearTimeout(easterTimer); easterTimer = null; }

      toast.style.display = 'block';
      inner.classList.remove('toast-out');
      inner.classList.add('toast-in');

      easterTimer = setTimeout(() => {
        inner.classList.remove('toast-in', 'profit-toast-glow');
        inner.classList.add('toast-out');
        setTimeout(() => {
          toast.style.display = 'none';
          inner.classList.remove('toast-out');
          // 重置样式
          inner.style.borderColor = '';
          inner.style.boxShadow = '';
          textEl.style.color = '';
          textEl.style.textShadow = '';
        }, 400);
      }, 5000);
    }

    // 彩纸特效
    function spawnConfetti() {
      const colors = ['#ff2d95', '#00f0ff', '#a855f7', '#00ff88', '#e8b931', '#ff3366'];
      const container = document.body;
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (Math.random() * 8 + 6) + 'px';
        el.style.height = (Math.random() * 8 + 6) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (Math.random() * 2 + 2) + 's';
        el.style.animationDelay = (Math.random() * 1) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }
    }

    function checkEasterEgg() {
      const roundHistory = state.history.filter(r => r.round === state.gameRound);
      if (roundHistory.length < 3) return;

      for (let pi = 0; pi < 4; pi++) {
        let streak = 0;
        for (let j = roundHistory.length - 1; j >= 0; j--) {
          if (roundHistory[j].winner === pi) { streak++; }
          else { break; }
        }
        if (streak >= 3 && streak <= 6) {
          const name = state.players[pi];
          const shortName = name.length > 1 ? name.substring(0, 1) : name;
          showEasterToast(`${shortName}哥，${EASTER_MSGS[streak]}`);
          break;
        }
      }
    }

    function showEasterToast(text) {
      const toast = document.getElementById('easterToast');
      const textEl = document.getElementById('easterText');
      const emojiEl = document.getElementById('easterEmoji');
      const inner = toast.querySelector('div');

      textEl.textContent = text;
      emojiEl.textContent = '🐶';
      textEl.style.color = '';
      textEl.style.textShadow = '';
      inner.style.borderColor = '';
      inner.style.boxShadow = '';
      inner.classList.remove('profit-toast-glow');

      if (easterTimer) { clearTimeout(easterTimer); easterTimer = null; }

      toast.style.display = 'block';
      inner.classList.remove('toast-out');
      inner.classList.add('toast-in');

      easterTimer = setTimeout(() => {
        inner.classList.remove('toast-in');
        inner.classList.add('toast-out');
        setTimeout(() => {
          toast.style.display = 'none';
          inner.classList.remove('toast-out');
        }, 400);
      }, 5000);
    }

    // ---------- 操作 ----------
    function onCardInput(idx, value) {
      if (value === '') { cardInputs[idx] = null; }
      else {
        let num = parseInt(value, 10);
        if (isNaN(num) || num < 1) num = 1;
        if (num > 100) num = 100;
        cardInputs[idx] = num;
      }
      updateButtons();
    }

    function handleConfirmTurn() {
      const winners = [];
      const losers = [];
      for (let i = 0; i < 4; i++) {
        if (cardInputs[i] === null || cardInputs[i] === 0) { winners.push(i); }
        else { losers.push({ idx: i, cards: cardInputs[i] }); }
      }
      if (winners.length !== 1) {
        alert('請恰好留空1位玩家（赢家），其他3位必須輸入牌數');
        return;
      }
      const turnProfits = calcTurnProfits(winners[0], losers);
      // 记录更新前的总盈利，用于检测突破
      const oldTotalProfits = state.profits.map((p, i) => p + state.roundProfits[i]);
      state.undoStack.push({
        totalScores: [...state.totalScores], profits: [...state.profits],
        roundScores: [...state.roundScores], roundProfits: [...state.roundProfits],
        history: JSON.parse(JSON.stringify(state.history)),
        gameRound: state.gameRound, turnInRound: turnInRound,
      });
      losers.forEach(l => { state.roundScores[l.idx] += l.cards; });
      state.roundProfits = state.roundProfits.map((p, i) => p + turnProfits[i]);
      state.history.push({
        round: state.gameRound, turnInRound: turnInRound,
        winner: winners[0], losers: losers,
        roundScores: [...state.roundScores], turnProfits: turnProfits, settled: false,
      });
      turnInRound++;
      const triggered = state.roundScores.map((s, i) => s >= 100 ? i : -1).filter(i => i !== -1);
      if (triggered.length > 0) { handleGameRoundEnd(triggered); }
      else {
        // 检测盈利突破
        const newTotalProfits = state.profits.map((p, i) => p + state.roundProfits[i]);
        checkProfitMilestone(oldTotalProfits, newTotalProfits);
        cardInputs = [null, null, null, null];
        renderAll();
        checkEasterEgg();
      }
    }

    function handleGameRoundEnd(triggerIndices) {
      // 结算前保存快照，以便撤回
      state.undoStack.push({
        totalScores: [...state.totalScores],
        profits: [...state.profits],
        roundScores: [...state.roundScores],
        roundProfits: [...state.roundProfits],
        history: JSON.parse(JSON.stringify(state.history)),
        gameRound: state.gameRound,
        turnInRound: turnInRound,
        isSettlement: true,  // 标记为结算快照
      });

      const settledScores = state.roundScores.map(s => Math.floor(s / 10) * 10);
      const carryOver = state.roundScores.map(s => s % 10);
      state.totalScores = state.totalScores.map((t, i) => t + settledScores[i]);
      state.profits = state.profits.map((p, i) => p + state.roundProfits[i]);
      state.history.forEach(r => { if (r.round === state.gameRound) r.settled = true; });
      showSettlementModal(triggerIndices, settledScores, carryOver);
    }

    function showSettlementModal(triggerIndices, settledScores, carryOver) {
      // 冲线玩家
      const triggerName = triggerIndices.map(i => state.players[i]).join('、');
      document.getElementById('settlementTrigger').textContent =
        `${triggerName} 玩家沖線！下一轮由 ♦️3 開始吧！`;

      // 计算本小局每个玩家的总牌数
      const roundCards = [0, 0, 0, 0];
      state.history.forEach(r => {
        if (r.round === state.gameRound) {
          r.losers.forEach(l => { roundCards[l.idx] += l.cards; });
        }
      });

      const summary = document.getElementById('settlementSummary');
      summary.innerHTML = state.players.map((name, i) => {
        const roundTotal = state.roundScores[i];
        const settled = settledScores[i];
        const carry = carryOver[i];
        const roundProfit = state.roundProfits[i];
        const totalProfit = state.profits[i];
        const totalCards = roundCards[i];
        const neon = NEON_CSS[NEON_COLORS[i]];
        return `
          <div class="rounded-xl px-3 py-2.5" style="background:${neon.bg};border:1px solid ${neon.border};">
            <div class="flex items-center justify-between mb-1">
              <span class="font-medium text-white text-sm">${escapeHtml(name)}</span>
              <span class="text-lg font-black ${totalProfit > 0 ? 'neon-text-green' : totalProfit < 0 ? 'neon-text-red' : 'text-white'}">
                ${totalProfit > 0 ? '+' : ''}${totalProfit}
              </span>
            </div>
            <div class="flex items-center gap-1 text-[11px] text-gray-400 flex-wrap">
              <span>總牌數 <b class="text-gray-200">${totalCards}</b></span>
              <span class="text-gray-600">·</span>
              <span>結算 <b style="color:#e8b931;">+${settled}</b></span>
              <span class="text-gray-600">+</span>
              <span>繼承 <b class="text-gray-200">${carry}</b></span>
            </div>
            <div class="text-[11px] mt-1">
              <span class="${roundProfit > 0 ? 'neon-text-green' : roundProfit < 0 ? 'neon-text-red' : 'text-gray-400'}">
                本局盈利 ${roundProfit > 0 ? '+' : ''}${roundProfit} 張
              </span>
            </div>
          </div>`;
      }).join('');

      document.getElementById('settlementModal').style.display = 'flex';
    }

    function closeSettlementModal() { document.getElementById('settlementModal').style.display = 'none'; }

    function startNewGameRound() {
      closeSettlementModal();
      const carryOver = state.roundScores.map(s => s % 10);
      state.gameRound += 1;
      state.roundScores = carryOver;
      state.roundProfits = [0, 0, 0, 0];
      turnInRound = 1;
      cardInputs = [null, null, null, null];
      renderAll();
    }

    function handleUndo() {
      if (state.undoStack.length === 0) return;
      const snapshot = state.undoStack.pop();

      // 如果正在显示结算弹窗，先关闭
      closeSettlementModal();

      state.totalScores = snapshot.totalScores;
      state.profits = snapshot.profits;
      state.roundScores = snapshot.roundScores;
      state.roundProfits = snapshot.roundProfits;
      state.history = snapshot.history;
      state.gameRound = snapshot.gameRound;
      turnInRound = snapshot.turnInRound;
      cardInputs = [null, null, null, null];
      renderAll();
    }

    function handleResetRound() {
      if (!confirm('確定要重置當前小局嗎？本局輪次記錄將清除，總積分保留。')) return;
      state.undoStack.push({
        totalScores: [...state.totalScores], profits: [...state.profits],
        roundScores: [...state.roundScores], roundProfits: [...state.roundProfits],
        history: JSON.parse(JSON.stringify(state.history)),
        gameRound: state.gameRound, turnInRound: turnInRound,
      });
      state.history = state.history.filter(r => r.round !== state.gameRound);
      state.roundScores = [0, 0, 0, 0];
      state.roundProfits = [0, 0, 0, 0];
      turnInRound = 1;
      cardInputs = [null, null, null, null];
      renderAll();
    }

    function handleResetGame() {
      if (!confirm('確定要重置整個遊戲嗎？所有分數和歷史記錄將清空。')) return;
      state.undoStack.push({
        totalScores: [...state.totalScores], profits: [...state.profits],
        roundScores: [...state.roundScores], roundProfits: [...state.roundProfits],
        history: JSON.parse(JSON.stringify(state.history)),
        gameRound: state.gameRound, turnInRound: turnInRound,
      });
      state.totalScores = [0, 0, 0, 0];
      state.profits = [0, 0, 0, 0];
      state.roundScores = [0, 0, 0, 0];
      state.roundProfits = [0, 0, 0, 0];
      state.history = [];
      state.gameRound = 1;
      turnInRound = 1;
      cardInputs = [null, null, null, null];
      renderAll();
    }

    // ---------- 工具 ----------
    function editPlayerName(idx) {
      const newName = prompt('輸入新名稱：', state.players[idx]);
      if (newName !== null && newName.trim() !== '') {
        state.players[idx] = newName.trim().substring(0, 8);
        renderAll();
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------- PWA Service Worker ----------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // ---------- 啟動 ----------
    init();
  </script>
</body>
</html>
